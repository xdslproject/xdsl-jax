import lit.formats
import os
from pathlib import Path

config.test_source_root = os.path.dirname(__file__)
xdsl_src = Path(config.test_source_root).parent.parent


config.name = "xDSL"
config.suffixes = ['.test', '.mlir', '.py']

config.substitutions.append((
    "XDSL_ROUNDTRIP", # To be used on a pretty printed form IR
    "xdsl-opt %s --print-op-generic --split-input-file | " # parse input and print with xdsl-opt in generic form
    "xdsl-opt --split-input-file | " # parse the generic form and print in pretty print form with xdsl-opt
    "filecheck %s"))
config.substitutions.append((
    "XDSL_GENERIC_ROUNDTRIP", # To be used on a generic form IR 
    "xdsl-opt %s --print-op-generic --split-input-file | " # parse input and print with xdsl-opt in generic form
    "filecheck %s --check-prefix=CHECK-GENERIC"))
config.substitutions.append((
    "XDSL_JAX_ROUNDTRIP", # To be used on a pretty printed form IR
    f"xdsl-opt %s --split-input-file | " # parse the input and print in pretty print form with xdsl-opt
    f"python {xdsl_src}/tests/jax_roundtrip.py | " # parse the output of xdsl-opt and print with JAX's MLIR API in pretty print form
    f"xdsl-opt %s --split-input-file | " # parse the output of JAX's MLIR API and print in pretty print form with xdsl-opt
    f"filecheck %s"))
config.substitutions.append((
    "XDSL_JAX_GENERIC_ROUNDTRIP", # To be used on a generic form IR
    f"xdsl-opt %s --print-op-generic --split-input-file | " # parse the input and print in generic form with xdsl-opt
    f"python {xdsl_src}/tests/jax_roundtrip.py --print-generic | " # parse the output of xdsl-opt and print with JAX's MLIR API in generic form
    f"xdsl-opt %s --print-op-generic --split-input-file | " # parse the output of JAX's MLIR API and print in generic form with xdsl-opt
    f"filecheck %s --check-prefix=CHECK-GENERIC"))
config.substitutions.append((
    "JAX_ROUNDTRIP", # To be used on a pretty printed form IR
    f"python {xdsl_src}/tests/jax_roundtrip.py %s | " # parse input and print with JAX's MLIR API in pretty print form
    "filecheck %s --check-prefix=CHECK-JAX"))
config.substitutions.append((
    "JAX_GENERIC_ROUNDTRIP", # To be used on a generic form IR
    f"python {xdsl_src}/tests/jax_roundtrip.py --print-generic | " # parse input and print with JAX's MLIR API in generic form
    f"filecheck %s --check-prefix=CHECK-JAX-GENERIC"))

if "COVERAGE" in lit_config.params:
    # If we collect coverage, cd to root so that the paths relative to the Python path
    # match with the paths relative to the root of the repo.
    config.test_format = lit.formats.ShTest(preamble_commands=[f"cd {xdsl_src}"])

    # We also need to actually collect coverage for each command executed, and adjust
    config.substitutions.append(('xdsl-opt', "coverage run -m xdsl.tools.xdsl_opt"))
    config.substitutions.append(('xdsl-run', "coverage run -m xdsl.tools.xdsl_run"))
    config.substitutions.append(('irdl-to-pyrdl', "coverage run -m xdsl.tools.irdl_to_pyrdl"))
    config.substitutions.append(('python', "coverage run"))
else:
    config.test_format = lit.formats.ShTest()


# checking if maxIndividualTestTime is available on the platform and sets
# it to 20sec if so, declares lit-max-individual-test-time feature for
# further checking by tests.
supported, errormsg = lit_config.maxIndividualTestTimeIsSupported
if supported:
    config.available_features.add("lit-max-individual-test-time")
    lit_config.maxIndividualTestTime = 20
else:
    lit_config.warning(
        "Setting a timeout per test not supported. "
        + errormsg
        + " Some tests will be skipped."
    )
